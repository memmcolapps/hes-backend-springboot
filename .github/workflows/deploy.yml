name: HES CI/CD pipeline

on:
  push:
    branches:
      - staging
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # =====================
      # Checkout
      # =====================
      - name: Checkout code
        uses: actions/checkout@v4

      # =====================
      # Java Setup
      # =====================
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # =====================
      # Build
      # =====================
      - name: Build with Maven
        working-directory: hes
        run: |
          chmod +x ./mvnw
          ./mvnw package -DskipTests

      # =====================
      # Resolve JAR
      # =====================
      - name: Resolve JAR
        working-directory: hes
        run: |
          JAR_FILE=$(find target -name "*.jar" ! -name "*original*.jar" | head -n 1)

          if [ -z "$JAR_FILE" ]; then
            echo "No JAR found"
            exit 1
          fi

          echo "JAR_FILE=hes/$JAR_FILE" >> $GITHUB_ENV
          echo "Found JAR: $JAR_FILE"

      # =====================================================
      # SSH SETUP (STAGING)
      # =====================================================
      - name: Setup SSH (Staging)
        if: github.ref == 'refs/heads/staging'
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}

      # =====================================================
      # DEPLOY STAGING
      # =====================================================
      - name: Deploy Staging
        if: github.ref == 'refs/heads/staging'
        run: |
          SERVER="${{ secrets.STAGING_SERVER_USER }}@${{ secrets.STAGING_SERVER_HOST }}"
          REMOTE_PATH="/${{LOCATION}}/hes-app.jar"

          echo "Creating remote directory..."
          ssh -o StrictHostKeyChecking=no $SERVER "mkdir -p /${{LOCATION}}"

          echo "Uploading JAR..."
          rsync -az --delete -e "ssh -o StrictHostKeyChecking=no" \
            "$JAR_FILE" \
            $SERVER:$REMOTE_PATH

          echo "Writing env file..."
          ssh -o StrictHostKeyChecking=no $SERVER "cat > /${{LOCATION}}/staging.env" << EOF
          DB_HOST="${{ secrets.STAGING_DB_HOST }}"
          DB_PORT="${{ secrets.STAGING_DB_PORT }}"
          DB_NAME="${{ secrets.STAGING_DB_NAME }}"
          MONGO_HOST="${{ secrets.STAGING_MONGO_HOST }}"
          MONGO_PORT="${{ secrets.STAGING_MONGO_PORT }}"
          MONGO_DB="${{ secrets.STAGING_MONGO_DB }}"
          DB_USERNAME="${{ secrets.STAGING_DB_USERNAME }}"
          DB_PASSWORD="${{ secrets.STAGING_DB_PASSWORD }}"
          EUREKA_ADDRESS="${{ secrets.EUREKA_ADDRESS }}"
          EUREKA_PORT="${{ secrets.EUREKA_ADDRESS }}"
          TOKEN_ISSUER="${{ secrets.T_ISSUER }}"
          TOKEN_ACCESS="${{ secrets.T_ACCESS }}"
          TOKEN_REFRESH="${{ secrets.T_REFRESH }}"
          TOKEN_SECRET="${{ secrets.T_SECRET }}"
          SPRING_SECURITY_USER="${{ secrets.SPRING_SECURITY_USER }}"
          SPRING_SECURITY_PASSWORD="${{ secrets.SPRING_SECURITY_PASSWORD }}"
          EOF
          
          ssh -o StrictHostKeyChecking=no $SERVER "chmod 600 /${{LOCATION}}/staging.env"



          echo "Deploying (safe SSH execution)..."
          ssh -o StrictHostKeyChecking=no $SERVER 'bash -s' << 'EOF'

            set -e

            echo "Stopping app safely..."

            PID=$(ps -ef | grep hes-app.jar | grep -v grep | awk '{print $2}')

            if [ -n "$PID" ]; then
              echo "Killing PID: $PID"
              kill -9 $PID || true
            else
              echo "No running process found"
            fi

            echo "Starting app..."

             set -a
            source /${{LOCATION}}/staging.env
            set +a

            nohup java -Dspring.profiles.active=staging \
              -jar /${{LOCATION}}/hes-app.jar \
              > /${{LOCATION}}/hes-staging.log 2>&1 &

            echo "Deployment complete"
          EOF

      # =====================================================
      # SSH SETUP (PRODUCTION)
      # =====================================================
      - name: Setup SSH (Production)
        if: github.ref == 'refs/heads/main'
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}

      # =====================================================
      # DEPLOY PRODUCTION
      # =====================================================
      - name: Deploy Production
        if: github.ref == 'refs/heads/main'
        run: |
          SERVER="${{ secrets.PROD_SERVER_USER }}@${{ secrets.PROD_SERVER_HOST }}"
          REMOTE_PATH="/${{LOCATION}}/hes-app.jar"

          echo "Creating remote directory..."
          ssh -o StrictHostKeyChecking=no $SERVER "mkdir -p /${{LOCATION}}"

          echo "Uploading JAR..."
          rsync -az --delete -e "ssh -o StrictHostKeyChecking=no" \
            "$JAR_FILE" \
            $SERVER:$REMOTE_PATH

          echo "Writing env file..."
          ssh -o StrictHostKeyChecking=no $SERVER "cat > /${{LOCATION}}/prod.env" << EOF
          DB_HOST="${{ secrets.PROD_DB_HOST }}"
          DB_PORT="${{ secrets.PROD_DB_PORT }}"
          DB_NAME="${{ secrets.PROD_DB_NAME }}"
          MONGO_HOST="${{ secrets.PROD_MONGO_HOST }}"
          MONGO_PORT="${{ secrets.PROD_MONGO_PORT }}"
          MONGO_DB="${{ secrets.PROD_MONGO_DB }}"
          DB_USERNAME="${{ secrets.PROD_DB_USERNAME }}"
          DB_PASSWORD="${{ secrets.PROD_DB_PASSWORD }}"
          EUREKA_ADDRESS="${{ secrets.EUREKA_ADDRESS }}"
          EUREKA_PORT="${{ secrets.EUREKA_ADDRESS }}"
          TOKEN_ISSUER="${{ secrets.T_ISSUER }}"
          TOKEN_ACCESS="${{ secrets.T_ACCESS }}"
          TOKEN_REFRESH="${{ secrets.T_REFRESH }}"
          TOKEN_SECRET="${{ secrets.T_SECRET }}"
          SPRING_SECURITY_USER="${{ secrets.SPRING_SECURITY_USER }}"
          SPRING_SECURITY_PASSWORD="${{ secrets.SPRING_SECURITY_PASSWORD }}"
          EOF
          
          ssh -o StrictHostKeyChecking=no $SERVER "chmod 600 /${{LOCATION}}/prod.env"

          echo "Deploying (safe SSH execution)..."
          ssh -o StrictHostKeyChecking=no $SERVER 'bash -s' << 'EOF'

            set -e

            echo "Stopping app safely..."

            PID=$(ps -ef | grep hes-app.jar | grep -v grep | awk '{print $2}')

            if [ -n "$PID" ]; then
              echo "Killing PID: $PID"
              kill -9 $PID || true
            else
              echo "No running process found"
            fi

            echo "Starting app..."

            nohup java -Dspring.profiles.active=prod \
              -jar /${{LOCATION}}/hes-app.jar \
              > /${{LOCATION}}/hes-prod.log 2>&1 &

            echo "Deployment complete"
          EOF


