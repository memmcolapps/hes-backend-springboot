name: HES CI/CD Pipeline

on:
  push:
    branches:
      - staging
      - main


jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # =====================
      # Checkout code
      # =====================
      - name: Checkout code
        uses: actions/checkout@v4

      # =====================
      # Setup Java
      # =====================
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      # =====================
      # Build app
      # =====================
      - name: Build with Maven
        run: |
          chmod +x mvnw
          ./mvnw clean package -DskipTests
        working-directory: hes

      # =====================================================
      # STAGING DEPLOYMENT
      # =====================================================
      - name: Setup SSH Agent (Staging)
        if: github.ref == 'refs/heads/staging'
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}

      - name: Deploy to Staging Server
        if: github.ref == 'refs/heads/staging'
        run: |
          ssh -o StrictHostKeyChecking=no \
            ${{ secrets.STAGING_SERVER_USER }}@${{ secrets.STAGING_SERVER_HOST }} << 'EOF'
              sudo mkdir -p /opt/java-webservices
              sudo chown -R $USER:$USER /opt/java-webservices
              pkill -f hes-app.jar || true
          EOF

          scp -o StrictHostKeyChecking=no \
            hes/target/*.jar \
            ${{ secrets.STAGING_SERVER_USER }}@${{ secrets.STAGING_SERVER_HOST }}:/opt/java-webservices/hes-app.jar

          ssh -o StrictHostKeyChecking=no \
            ${{ secrets.STAGING_SERVER_USER }}@${{ secrets.STAGING_SERVER_HOST }} << 'EOF'
              export SPRING_PROFILES_ACTIVE=staging

              export SPRING_DATASOURCE_USERNAME=${{ secrets.STAGING_DB_USERNAME }}
              export SPRING_DATASOURCE_PASSWORD=${{ secrets.STAGING_DB_PASSWORD }}
              export SPRING_SECURITY_USER=${{ secrets.SPRING_SECURITY_USER }}
              export SPRING_SECURITY_PASSWORD=${{ secrets.SPRING_SECURITY_PASSWORD }}

              nohup java -jar \
                -Dspring.profiles.active=staging \
                /opt/java-webservices/hes-app.jar \
                > /opt/java-webservices/hes-staging.log 2>&1 &
          EOF

      # =====================================================
      # PRODUCTION DEPLOYMENT
      # =====================================================
      - name: Setup SSH Agent (Production)
        if: github.ref == 'refs/heads/main'
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}

      - name: Deploy to Production Server
        if: github.ref == 'refs/heads/main'
        run: |
          ssh -o StrictHostKeyChecking=no \
            ${{ secrets.PROD_SERVER_USER }}@${{ secrets.PROD_SERVER_HOST }} << 'EOF'
              mkdir -p /opt/java-webservices
              chown -R $USER:$USER /opt/java-webservices
              pkill -f hes-app.jar || true
          EOF

          scp -o StrictHostKeyChecking=no \
            hes/target/*.jar \
            ${{ secrets.PROD_SERVER_USER }}@${{ secrets.PROD_SERVER_HOST }}:/opt/java-webservices/hes-app.jar

          ssh -o StrictHostKeyChecking=no \
            ${{ secrets.PROD_SERVER_USER }}@${{ secrets.PROD_SERVER_HOST }} << 'EOF'
              export SPRING_PROFILES_ACTIVE=prod

              export SPRING_DATASOURCE_USERNAME=${{ secrets.PROD_DB_USERNAME }}
              export SPRING_DATASOURCE_PASSWORD=${{ secrets.PROD_DB_PASSWORD }}
              export SPRING_SECURITY_USER=${{ secrets.PROD_SPRING_SECURITY_USER }}
              export SPRING_SECURITY_PASSWORD=${{ secrets.PROD_SPRING_SECURITY_PASSWORD }}

              nohup java -jar \
                -Dspring.profiles.active=prod \
                /opt/java-webservices/hes-app.jar \
                > /opt/java-webservices/hes-prod.log 2>&1 &
          EOF


