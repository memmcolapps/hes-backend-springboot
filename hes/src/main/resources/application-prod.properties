# Production profile: application-prod.properties
spring.application.name=hes-service
nettyserver.port=29062
#29067
# Logging
logging.level.com.memmcol=DEBUG
logging.level.org.hibernate=INFO
logging.level.org.springframework=INFO

# Database
spring.datasource.url=jdbc:postgresql://127.0.0.1:8324/gridflex-DB
spring.datasource.username=${PROD_DB_USERNAME:gridflexuser}
spring.datasource.password=${PROD_DB_PASSWORD:Passw0rd0405&}
spring.datasource.driver-class-name=org.postgresql.Driver

###Eureka is a Service Registry (from Netflix OSS, integrated with Spring Cloud).
eureka.client.service-url.defaultZone=http://127.0.0.1:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true


# Hibernate JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.connection.autocommit=false

# HikariCP
spring.datasource.hikari.maximum-pool-size=60
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.pool-name=HikariPool-HES-PROD

# Security
spring.security.user.name=${SPRING_SECURITY_USER:svc_hes_admin_9qT7}
spring.security.user.password=${SPRING_SECURITY_PASSWORD:D!7eXb9@pQw#Lr2zNf%uK8}

#HES Executor pool
hes.meter.executor.size=50

# Household meters: comma-separated list of model numbers eligible for household profile jobs
hes.profile.household.models=${HES_HOUSEHOLD_MODELS:MMX-110-NG,MMX-310-NG,MMX-110-DIN}

# Household-tier OBIS for token events (MD/CT tier uses scheduler_job_info.obis_codes).
hes.events.profiles[recharge-token].household=${HES_EVENT_RECHARGE_TOKEN_OBIS_HH:0.0.99.98.3.255}
hes.events.profiles[management-token].household=${HES_EVENT_MANAGEMENT_TOKEN_OBIS_HH:0.0.99.98.5.255}
hes.events.profiles[fraud-event].household=${HES_EVENT_FRAUD_OBIS_HH:0.0.99.98.1.255}
hes.events.profiles[control-event].household=${HES_EVENT_CONTROL_OBIS_HH:0.0.99.98.2.255}

# Actuator
management.endpoints.web.exposure.include=prometheus,health,metrics
management.metrics.enable.cache=true
management.endpoints.web.base-path=/actuator
management.endpoint.prometheus.access=read_only
